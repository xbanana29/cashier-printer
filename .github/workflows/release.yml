name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:

          # ── Windows x64 ──────────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

          # ── macOS Intel ──────────────────────────────────────────────────────
          - os: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg

          # ── macOS Apple Silicon ───────────────────────────────────────────────
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg

          # ── Linux x64 ────────────────────────────────────────────────────────
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - name: Install Trunk (wasm bundler for the Dioxus frontend)
        uses: jetli/trunk-action@v0.5.0
        with:
          # Pin to a known-good version. 'latest' once broke the build when a new
          # Trunk release changed [watch].ignore canonicalization behaviour.
          version: 'v0.21.7'

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libcups2-dev \
            libudev-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Print Paste Order ${{ github.ref_name }}'
          # Body ini juga jadi catatan update yang tampil di dalam aplikasi.
          # Tiap rilis: cukup ganti daftar "Yang baru" di bawah. Jaga tetap plain-text
          # (tanpa tabel/markdown berat) agar rapi saat ditampilkan di banner updater.
          releaseBody: |
            Print Paste Order ${{ github.ref_name }}

            Yang baru:
            • Tambah perangkat sinkronisasi manual via IP — untuk jaringan yang memblokir penemuan otomatis
            • Panel diagnosa sinkronisasi LAN: IP, port, profil jaringan, device ID
            • Tombol "Perbaiki Firewall" untuk membuka port sinkronisasi di Windows
            • Logo aplikasi baru

            Download: pilih file di bagian Assets di bawah
            Windows .exe  •  macOS .dmg  •  Linux .AppImage
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
