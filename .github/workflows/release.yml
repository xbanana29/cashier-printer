name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:

          # ── Windows x64 ──────────────────────────────────────────────────────
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

          # ── macOS Intel ──────────────────────────────────────────────────────
          - os: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg

          # ── macOS Apple Silicon ───────────────────────────────────────────────
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg

          # ── Linux x64 ────────────────────────────────────────────────────────
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - name: Install Trunk (wasm bundler for the Dioxus frontend)
        uses: jetli/trunk-action@v0.5.0
        with:
          version: 'latest'

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libcups2-dev \
            libudev-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Print Paste Order ${{ github.ref_name }}'
          releaseBody: |
            ## Print Paste Order (PPO) ${{ github.ref_name }}

            Aplikasi cetak struk pesanan untuk toko kecil — ringan, offline, tanpa instalasi server.

            ### Download

            | Platform | File | Keterangan |
            |---|---|---|
            | Windows 64-bit | `*.exe` (NSIS) | Setup installer, tidak perlu admin |
            | macOS Intel | `*_x64.dmg` | macOS 10.15+ |
            | macOS Apple Silicon | `*_aarch64.dmg` | M1/M2/M3 |
            | Linux 64-bit | `*.AppImage` | Portable, tidak perlu install |

            ### Cara pakai
            - **Windows**: Jalankan `.exe`, klik Next–Next–Finish
            - **macOS**: Buka `.dmg`, drag app ke Applications
            - **Linux**: `chmod +x *.AppImage` lalu jalankan langsung

            ### Printer yang didukung
            - RPP02 58mm (serial/USB)
            - EPSON TM-U220 75mm (serial/USB, dengan/tanpa cutter)
            - EPSON TM-T82X 80mm (USB / LAN)

            ### Perubahan v0.9.9
            - Fix layout cetak TM-U220 75mm: lebar kolom dikoreksi ke 33 (dari 38) agar checkbox tidak turun baris
            - Tambah toggle **Tebalkan tulisan item** (bold/emphasized mode)
            - Tambah toggle **Perbesar ukuran font item** (2× double-width + double-height)
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
